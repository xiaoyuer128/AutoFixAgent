<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业员工管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">企业员工管理系统</h1>
        
        <!-- 操作栏 -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-6 flex flex-col md:flex-row gap-4 justify-between items-center">
            <div class="flex gap-3 flex-1">
                <input id="keyword" type="text" placeholder="搜索姓名/部门/职位/邮箱" 
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <select id="statusFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">全部状态</option>
                    <option value="true">在职</option>
                    <option value="false">离职</option>
                </select>
                <button onclick="loadEmployees()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition">
                    搜索
                </button>
            </div>
            <button onclick="openAddModal()" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg transition">
                + 新增员工
            </button>
        </div>

        <!-- 员工列表 -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">姓名</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">部门</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">职位</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">邮箱</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">电话</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                    </tr>
                </thead>
                <tbody id="employeeList" class="bg-white divide-y divide-gray-200">
                </tbody>
            </table>
        </div>
    </div>

    <!-- 新增/编辑员工模态框 -->
    <div id="employeeModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
            <h2 id="modalTitle" class="text-xl font-bold text-gray-800 mb-4">新增员工</h2>
            <form id="employeeForm" class="space-y-4">
                <input type="hidden" id="employeeId">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                    <input type="text" id="name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">部门</label>
                    <input type="text" id="department" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">职位</label>
                    <input type="text" id="position" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                    <input type="email" id="email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">电话</label>
                    <input type="text" id="phone" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition">
                        取消
                    </button>
                    <button type="submit" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let employees = [];

        // 加载员工列表
        async function loadEmployees() {
            const keyword = document.getElementById('keyword').value;
            const status = document.getElementById('statusFilter').value;
            let url = '/api/employees?';
            if (keyword) url += `keyword=${encodeURIComponent(keyword)}&`;
            if (status) url += `status=${status}`;
            
            const res = await fetch(url);
            const data = await res.json();
            employees = data.data;
            renderEmployees();
        }

        // 渲染员工列表
        function renderEmployees() {
            const tbody = document.getElementById('employeeList');
            if (employees.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-12 text-center text-gray-500">暂无员工数据</td></tr>';
                return;
            }
            tbody.innerHTML = employees.map(emp => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${emp.id}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${emp.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${emp.department}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${emp.position}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${emp.email}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${emp.phone || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${emp.status ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                            ${emp.status ? '在职' : '离职'}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium flex gap-2">
                        <button onclick="toggleStatus(${emp.id})" class="text-indigo-600 hover:text-indigo-900">
                            切换状态
                        </button>
                        <button onclick="openEditModal(${emp.id})" class="text-blue-600 hover:text-blue-900">
                            编辑
                        </button>
                        <button onclick="deleteEmployee(${emp.id})" class="text-red-600 hover:text-red-900">
                            删除
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 打开新增模态框
        function openAddModal() {
            document.getElementById('modalTitle').textContent = '新增员工';
            document.getElementById('employeeForm').reset();
            document.getElementById('employeeId').value = '';
            document.getElementById('employeeModal').classList.remove('hidden');
        }

        // 打开编辑模态框
        function openEditModal(id) {
            const emp = employees.find(e => e.id === id);
            if (!emp) return;
            document.getElementById('modalTitle').textContent = '编辑员工';
            document.getElementById('employeeId').value = emp.id;
            document.getElementById('name').value = emp.name;
            document.getElementById('department').value = emp.department;
            document.getElementById('position').value = emp.position;
            document.getElementById('email').value = emp.email;
            document.getElementById('phone').value = emp.phone || '';
            document.getElementById('employeeModal').classList.remove('hidden');
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('employeeModal').classList.add('hidden');
        }

        // 提交表单
        document.getElementById('employeeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('employeeId').value;
            const data = {
                name: document.getElementById('name').value,
                department: document.getElementById('department').value,
                position: document.getElementById('position').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value
            };

            let url = '/api/employees';
            let method = 'POST';
            if (id) {
                url += `/${id}`;
                method = 'PUT';
            }

            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            alert(result.message);
            if (result.code === 200) {
                closeModal();
                loadEmployees();
            }
        });

        // 切换状态
        async function toggleStatus(id) {
            if (!confirm('确定要切换该员工的状态吗？')) return;
            const res = await fetch(`/api/employees/${id}/toggle-status`, { method: 'PATCH' });
            const result = await res.json();
            alert(result.message);
            if (result.code === 200) loadEmployees();
        }

        // 删除员工
        async function deleteEmployee(id) {
            if (!confirm('确定要删除该员工吗？此操作不可恢复！')) return;
            const res = await fetch(`/api/employees/${id}`, { method: 'DELETE' });
            const result = await res.json();
            alert(result.message);
            if (result.code === 200) loadEmployees();
        }

        // 页面加载完成后加载数据
        document.addEventListener('DOMContentLoaded', loadEmployees);
    </script>
</body>
</html>
